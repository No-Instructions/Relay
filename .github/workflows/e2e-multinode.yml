name: E2E multi-node

# Runs scripted test plans through the multi-node orchestrator
# (relay-harness scripts/orchestrate_test_plans.py) on a leased pool VM.
# The workflow has exactly four responsibilities: publish the run manifest,
# manage the VM and its credentials, invoke the harness node script once,
# and render the shared summary. Plan selection, slot provisioning, skip
# policy, evidence, and publishing all live in the harness.
#
# Topology is input data: `slots` lists each slot's platform. Both slots
# run colocated on one host. Supported today: linux,linux and
# windows,windows.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Product ref to test (e.g. origin/main, a branch, or a SHA)'
        required: true
        default: 'origin/main'
      plans:
        description: "Comma-separated plan ids, or 'default' for the ciDefault set"
        required: false
        default: 'default'
      harness_ref:
        description: 'relay-harness ref (e.g. origin/main, a branch, or a SHA)'
        required: false
        default: 'origin/main'
      slots:
        description: 'Comma-separated slot platforms (e.g. linux,linux or windows,windows)'
        required: false
        default: 'linux,linux'
      tsdb_tag:
        description: 'obsidian-tsdb release tag to install in slots'
        required: false
        default: '1.0.12'

env:
  GCP_PROJECT: tactile-timer-426817-t6
  # Set the CI_VM_ZONE repository variable to move CI to another zone.
  # Drain in-flight runs first: the VM-name pool lease only holds within
  # one zone, so runs straddling a switch could double-lease a pool.
  VM_ZONE: ${{ vars.CI_VM_ZONE || 'us-west1-b' }}
  MAX_POOLS: "8"
  VM_IMAGE_FAMILY: relay-e2e-base

jobs:
  multinode:
    name: multinode
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      checks: write
      contents: read
    env:
      SHARD_NAME: mn
      RUN_SHARD: "true"

    steps:
      - name: Write run manifest to R2
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
          CI_R2_ENDPOINT: ${{ secrets.CI_R2_ENDPOINT }}
          CI_R2_BUCKET: system3-ci
          REQUESTED_REF: ${{ inputs.ref }}
          REQUESTED_TESTS: ${{ inputs.plans }}
          REQUESTED_HARNESS_REF: ${{ inputs.harness_ref }}
          REQUESTED_PROFILE_FLAGS: ''
        run: |
          API_REF="$REQUESTED_REF"
          API_REF="${API_REF#origin/}"
          API_REF="${API_REF#refs/heads/}"
          API_REF="${API_REF#refs/tags/}"
          ENCODED_REF=$(jq -rn --arg ref "$API_REF" '$ref | @uri')
          PRODUCT_SHA=$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${ENCODED_REF}" \
            --jq .sha 2>/dev/null || true)

          if [ -z "$PRODUCT_SHA" ]; then
            echo "::error::Could not resolve $REQUESTED_REF before VM checkout"
            exit 1
          fi
          echo "Resolved $REQUESTED_REF to $PRODUCT_SHA"
          echo "product_sha=$PRODUCT_SHA" >> "$GITHUB_OUTPUT"

          MANIFEST_KEY="github-runs/${GITHUB_RUN_ID}/manifest.json"
          jq -n \
            --arg githubRunId "$GITHUB_RUN_ID" \
            --arg runNumber "$GITHUB_RUN_NUMBER" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg workflowRef "$GITHUB_REF" \
            --arg workflowSha "$GITHUB_SHA" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg ref "$REQUESTED_REF" \
            --arg productSha "$PRODUCT_SHA" \
            --arg tests "$REQUESTED_TESTS" \
            --arg harnessRef "$REQUESTED_HARNESS_REF" \
            --arg profileFlags "$REQUESTED_PROFILE_FLAGS" \
            --arg objectKey "$MANIFEST_KEY" \
            '{
              schema: 1,
              githubRunId: $githubRunId,
              runNumber: ($runNumber | tonumber),
              runAttempt: ($runAttempt | tonumber),
              workflow: $workflow,
              workflowRef: $workflowRef,
              workflowSha: $workflowSha,
              event: $event,
              inputs: {
                ref: $ref,
                productSha: $productSha,
                tests: $tests,
                harnessRef: $harnessRef,
                profileFlags: $profileFlags
              },
              report: {
                commit: $productSha,
                execSuffix: ("-r" + $runNumber)
              },
              objectKey: $objectKey
            }' > run-manifest.json

          aws s3api put-object \
            --endpoint-url "$CI_R2_ENDPOINT" \
            --bucket "$CI_R2_BUCKET" \
            --key "$MANIFEST_KEY" \
            --body run-manifest.json \
            --content-type application/json \
            --cache-control 'no-cache, must-revalidate' \
            --no-cli-pager >/dev/null
          echo "Uploaded s3://${CI_R2_BUCKET}/${MANIFEST_KEY}"

      - name: Validate topology
        run: |
          SLOTS="${{ github.event.inputs.slots }}"
          case "$SLOTS" in
            linux,linux|windows,windows) echo "topology: $SLOTS" ;;
            *) echo "::error::unsupported slot list: $SLOTS"; exit 1 ;;
          esac

      - name: Auth to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_TACTILE }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2

      - name: Lease a user pool by creating its VM
        if: github.event.inputs.slots == 'linux,linux'
        id: lease
        run: |
          # Each pool owns two staging users. The pair runs every plan
          # serially and can see a pool-specific storage-quota relay, so the
          # same Obsidian instances serve ordinary and attachment plans.
          # Slots 1-8 and 24/26 belong to the push-triggered serial lane, so
          # pools draw from slots 9-23 and 25. Creating the pool's VM is the lease:
          # instance names are unique, so two runs can never hold the same
          # pool. Deleting the VM (cleanup step) releases the lease.
          pool_slots() {
            case "$1" in
              1) echo "11,12" ;; 2) echo "15,16" ;; 3) echo "19,20" ;; 4) echo "23,25" ;;
              5) echo "9,10" ;; 6) echo "13,14" ;; 7) echo "17,18" ;; 8) echo "21,22" ;;
            esac
          }
          # Probe pools in random order: sequential probing sends every
          # low-concurrency dispatch to the same pool, so one unhealthy pool
          # (a leaked slot process) captures all quiet-hours traffic.
          for k in $(seq 1 "$MAX_POOLS" | shuf); do
            VM="relay-e2e-tt-p${k}"
            if ERR=$(gcloud compute instances create "$VM" \
              --project="$GCP_PROJECT" \
              --zone="$VM_ZONE" \
              --machine-type=e2-standard-4 \
              --image-family="$VM_IMAGE_FAMILY" \
              --image-project="$GCP_PROJECT" \
              --boot-disk-size=20GB \
              --boot-disk-type=pd-standard \
              --metadata=block-project-ssh-keys=TRUE \
              --tags=relay-e2e 2>&1 >/dev/null); then
              echo "Leased pool p${k} (shared slots $(pool_slots "$k"))"
              echo "VM_NAME=$VM" >> "$GITHUB_ENV"
              echo "pool=p${k}" >> "$GITHUB_OUTPUT"
              echo "slots=$(pool_slots "$k")" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if echo "$ERR" | grep -q "already exists"; then
              echo "Pool p${k} is leased by another run; trying next pool"
              continue
            fi
            if echo "$ERR" | grep -qE "ZONE_RESOURCE_POOL_EXHAUSTED|does not have enough resources"; then
              echo "::error::Zone $VM_ZONE has no capacity. Set the CI_VM_ZONE repository variable to move CI to another zone."
              exit 1
            fi
            echo "$ERR"
            exit 1
          done
          echo "All $MAX_POOLS pools are leased. If no other runs are active, a crashed run may have leaked a VM:"
          echo "  gcloud compute instances list --project=$GCP_PROJECT"
          echo "Delete the leaked instance to release its pool."
          exit 1

      - name: Wait for VM SSH readiness
        if: github.event.inputs.slots == 'linux,linux'
        run: |
          ssh-keygen -t rsa -b 3072 -f ~/.ssh/google_compute_engine -N "" -q 2>/dev/null || true
          mkdir -p ~/.ssh
          echo -e "\nHost *\n  ConnectTimeout 10" >> ~/.ssh/config

          for i in $(seq 1 30); do
            if gcloud compute ssh "$VM_NAME" --quiet \
              --zone="$VM_ZONE" --project="$GCP_PROJECT" \
              --tunnel-through-iap \
              --command="echo ready" 2>/dev/null; then
              echo "VM is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for VM SSH"
              exit 1
            fi
            sleep 5
          done

      - name: Provision VM credentials
        if: github.event.inputs.slots == 'linux,linux'
        run: |
          scp_retry() {
            local src="$1"
            local dest="$2"
            local label="$3"
            local attempt

            for attempt in $(seq 1 5); do
              if gcloud compute scp --quiet "$src" "$VM_NAME":"$dest" \
                --zone="$VM_ZONE" --project="$GCP_PROJECT" \
                --tunnel-through-iap; then
                return 0
              fi
              echo "Retrying $label scp ($attempt/5) ..."
              sleep 5
            done

            echo "Failed to copy $label to VM after 5 attempts"
            return 1
          }

          ssh_retry() {
            local label="$1"
            local command="$2"
            local attempt

            for attempt in $(seq 1 5); do
              if gcloud compute ssh "$VM_NAME" --quiet \
                --zone="$VM_ZONE" --project="$GCP_PROJECT" \
                --tunnel-through-iap \
                --command="$command"; then
                return 0
              fi
              echo "Retrying $label ssh command ($attempt/5) ..."
              sleep 5
            done

            echo "Failed $label ssh command after 5 attempts"
            return 1
          }

          echo '${{ secrets.GCP_SA_KEY_TACTILE }}' > /tmp/sa-key.json
          scp_retry /tmp/sa-key.json ~/ci-sa-key.json "service-account key"
          rm -f /tmp/sa-key.json

          echo '${{ secrets.HARNESS_DEPLOY_KEY }}' > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          scp_retry /tmp/deploy-key ~/ci-deploy-key "deploy key"
          rm -f /tmp/deploy-key

          ssh_retry "relay-e2e config dir creation" "mkdir -p ~/.config/relay-e2e"

          echo '${{ secrets.CI_R2_ENDPOINT }}' > /tmp/r2-endpoint
          echo '${{ secrets.CI_R2_ACCESS_KEY_ID }}' > /tmp/r2-access-key
          echo '${{ secrets.CI_R2_SECRET_ACCESS_KEY }}' > /tmp/r2-secret-key
          ssh_retry "R2 env write" "cat > ~/.config/relay-e2e/r2-env.sh << 'CREDS'
          export CI_R2_ENDPOINT='$(cat /tmp/r2-endpoint)'
          export CI_R2_ACCESS_KEY_ID='$(cat /tmp/r2-access-key)'
          export CI_R2_SECRET_ACCESS_KEY='$(cat /tmp/r2-secret-key)'
          CREDS
          chmod 600 ~/.config/relay-e2e/r2-env.sh"
          rm -f /tmp/r2-endpoint /tmp/r2-access-key /tmp/r2-secret-key

      - name: Run multi-node plans on VM
        if: github.event.inputs.slots == 'linux,linux'
        id: run-plans
        run: |
          INPUT_REF="${{ github.event.inputs.ref }}"
          REF="${INPUT_REF#origin/}"
          HREF="${{ github.event.inputs.harness_ref || 'origin/main' }}"
          SLOTS="${{ steps.lease.outputs.slots }}"
          LANE_SLUG="mn-${{ steps.lease.outputs.pool }}-r${{ github.run_number }}"

          gcloud compute ssh "$VM_NAME" --quiet \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --command="bash -s -- '$REF' '${{ github.event.inputs.plans }}' '$LANE_SLUG' '$SLOTS' '$HREF'" << 'REMOTE_SCRIPT'
          set -eo pipefail
          REF="$1"; PLANS="$2"; LANE_SLUG="$3"; SLOTS="$4"; HARNESS_REF="$5"

          mkdir -p ~/.ssh
          cp ~/ci-deploy-key ~/.ssh/ci-deploy-key 2>/dev/null || true
          chmod 600 ~/.ssh/ci-deploy-key 2>/dev/null || true
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/ci-deploy-key -o IdentitiesOnly=yes"

          if [ ! -d ~/relay-harness ]; then
            git clone git@github.com:No-Instructions/relay-harness.git ~/relay-harness
          fi
          cd ~/relay-harness
          git checkout -- . && git clean -fdq
          git fetch origin
          git checkout --detach "origin/${HARNESS_REF#origin/}" 2>/dev/null \
            || git checkout --detach "$HARNESS_REF"

          export TSDB_TAG='${{ github.event.inputs.tsdb_tag }}'
          bash scripts/mn-lane-node.sh "$REF" "$PLANS" "$LANE_SLUG" "$SLOTS"
          REMOTE_SCRIPT

      - name: Fetch results
        if: always() && github.event.inputs.slots == 'linux,linux'
        run: |
          rm -f summary.json metadata.json
          gcloud compute scp --quiet "$VM_NAME":~/test-plan-suite-output.txt ./suite-output.txt \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap 2>/dev/null || true
          gcloud compute scp --quiet "$VM_NAME":~/test-summary.json ./summary.json \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap 2>/dev/null || true
          gcloud compute scp --quiet "$VM_NAME":~/test-metadata.json ./metadata.json \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap 2>/dev/null || true

      - name: Create Windows slot VM
        if: github.event.inputs.slots == 'windows,windows'
        id: winvm
        run: |
          ssh-keygen -t rsa -b 3072 -f ~/.ssh/mnw-key -N "" -q
          cat > /tmp/win-startup.ps1 <<'PS1'
          $ErrorActionPreference = "Continue"
          function Log($m) { Write-Output "RELAY-SLOT: $m" }
          for ($i = 1; $i -le 6; $i++) {
            if (Get-Service sshd -ErrorAction SilentlyContinue) { break }
            try { Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 | Out-Null } catch { Log "sshd add attempt ${i}: $_" }
            Start-Sleep -Seconds 10
          }
          Set-Service -Name sshd -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service sshd -ErrorAction SilentlyContinue
          if (-not (Get-NetFirewallRule -Name sshd-relay -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -Name sshd-relay -DisplayName 'OpenSSH Server (relay)' -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort 22 | Out-Null
          }
          Enable-NetFirewallRule -Name 'OpenSSH-Server-In-TCP' -ErrorAction SilentlyContinue
          if (Test-Path "HKLM:\SOFTWARE\OpenSSH") {
            New-ItemProperty -Path "HKLM:\SOFTWARE\OpenSSH" -Name DefaultShell -Value "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -PropertyType String -Force | Out-Null
          }
          $rand = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 24 | ForEach-Object {[char]$_})
          $pw = ConvertTo-SecureString ($rand + '!Aa9') -AsPlainText -Force
          if (-not (Get-LocalUser -Name relay -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name relay -Password $pw -PasswordNeverExpires -UserMayNotChangePassword | Out-Null
            Add-LocalGroupMember -Group Administrators -Member relay
          }
          $pub = $null
          try { $pub = Invoke-RestMethod -Headers @{'Metadata-Flavor'='Google'} -Uri 'http://metadata.google.internal/computeMetadata/v1/instance/attributes/relay-ssh-pubkey' } catch { Log "pubkey fetch failed: $_" }
          New-Item -ItemType Directory -Path "C:\ProgramData\ssh" -Force | Out-Null
          $adminKeys = "C:\ProgramData\ssh\administrators_authorized_keys"
          if ($pub) {
            Set-Content -Path $adminKeys -Value $pub -Encoding ascii
            icacls $adminKeys /inheritance:r | Out-Null
            icacls $adminKeys /grant "SYSTEM:F" | Out-Null
            icacls $adminKeys /grant "BUILTIN\Administrators:F" | Out-Null
          }
          Restart-Service sshd -ErrorAction SilentlyContinue
          Log "startup complete"
          PS1
          VM="relay-e2e-mnw-${{ github.run_number }}"
          # Discard stdout: the create table prints instance addresses, which
          # do not belong in the public log.
          if ! ERR=$(gcloud compute instances create "$VM" \
            --project="$GCP_PROJECT" --zone="$VM_ZONE" \
            --machine-type=e2-standard-8 \
            --image-family=relay-e2e-windows --image-project="$GCP_PROJECT" \
            --boot-disk-size=100GB --boot-disk-type=pd-ssd --tags=relay-e2e \
            --metadata=block-project-ssh-keys=TRUE,relay-ssh-pubkey="$(cat ~/.ssh/mnw-key.pub)" \
            --metadata-from-file=windows-startup-script-ps1=/tmp/win-startup.ps1 \
            2>&1 >/dev/null); then
            if echo "$ERR" | grep -qE "ZONE_RESOURCE_POOL_EXHAUSTED|does not have enough resources"; then
              echo "::error::Zone $VM_ZONE has no capacity. Set the CI_VM_ZONE repository variable to move CI to another zone."
            fi
            echo "$ERR"
            exit 1
          fi
          echo "Created $VM"
          echo "VM_NAME=$VM" >> "$GITHUB_ENV"

      - name: Wait for Windows SSH readiness
        if: github.event.inputs.slots == 'windows,windows'
        run: |
          WSSH() { gcloud compute ssh "relay@$VM_NAME" --quiet --zone="$VM_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap --ssh-key-file="$HOME/.ssh/mnw-key" \
            --ssh-flag="-oStrictHostKeyChecking=no" --ssh-flag="-oUserKnownHostsFile=/dev/null" \
            --ssh-flag="-oBatchMode=yes" --ssh-flag="-oPasswordAuthentication=no" "$@"; }
          for i in $(seq 1 60); do
            if WSSH --command="Write-Output ready" 2>/dev/null | grep -q ready; then echo "windows ssh up"; exit 0; fi
            sleep 10
          done
          echo "Timed out waiting for Windows SSH"; exit 1

      - name: Provision Windows credentials and harness
        if: github.event.inputs.slots == 'windows,windows'
        run: |
          WSSH() { gcloud compute ssh "relay@$VM_NAME" --quiet --zone="$VM_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap --ssh-key-file="$HOME/.ssh/mnw-key" \
            --ssh-flag="-oStrictHostKeyChecking=no" --ssh-flag="-oUserKnownHostsFile=/dev/null" \
            --ssh-flag="-oBatchMode=yes" --ssh-flag="-oPasswordAuthentication=no" "$@"; }
          push_b64() { # $1 = local file, $2 = remote path
            local B64=$(base64 -w0 "$1")
            WSSH --command="powershell -NoProfile -Command \"[IO.File]::WriteAllText('$2',[Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('$B64')))\""
          }
          echo '${{ secrets.HARNESS_DEPLOY_KEY }}' > /tmp/deploy-key
          push_b64 /tmp/deploy-key 'C:\ci-deploy-key'
          rm -f /tmp/deploy-key
          cat > /tmp/r2-env.ps1 <<'CREDS'
          $env:CI_R2_ENDPOINT = '${{ secrets.CI_R2_ENDPOINT }}'
          $env:CI_R2_ACCESS_KEY_ID = '${{ secrets.CI_R2_ACCESS_KEY_ID }}'
          $env:CI_R2_SECRET_ACCESS_KEY = '${{ secrets.CI_R2_SECRET_ACCESS_KEY }}'
          CREDS
          sed -i 's/^          //' /tmp/r2-env.ps1
          push_b64 /tmp/r2-env.ps1 'C:\r2-env.ps1'
          rm -f /tmp/r2-env.ps1
          HREF="${{ github.event.inputs.harness_ref || 'origin/main' }}"
          cat > /tmp/win-clone.ps1 <<EOF
          \$ErrorActionPreference = 'Continue'
          # Git for Windows hands GIT_SSH_COMMAND to its MSYS shell, which eats
          # backslashes, so the key path must use forward slashes.
          \$env:GIT_SSH_COMMAND = 'ssh -i C:/ci-deploy-key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no'
          if (-not (Test-Path C:\relay-harness)) {
            \$cloneOut = git clone git@github.com:No-Instructions/relay-harness.git C:\relay-harness 2>&1
            if (\$LASTEXITCODE -ne 0) { Write-Output \$cloneOut; throw 'harness clone failed' }
          }
          Set-Location C:\relay-harness
          git checkout -- . 2>&1 | Out-Null; git clean -fdq 2>&1 | Out-Null
          git fetch origin 2>&1 | Out-Null
          git checkout --detach ('origin/' + '$HREF'.Replace('origin/','')) 2>&1 | Out-Null
          if (\$LASTEXITCODE -ne 0) { throw 'harness checkout failed' }
          git log -1 --format='harness: %h'
          EOF
          sed -i 's/^          //' /tmp/win-clone.ps1
          push_b64 /tmp/win-clone.ps1 'C:\win-clone.ps1'
          WSSH --command="powershell -NoProfile -File C:\win-clone.ps1"

      - name: Run multi-node plans on Windows VM
        if: github.event.inputs.slots == 'windows,windows'
        run: |
          WSSH() { gcloud compute ssh "relay@$VM_NAME" --quiet --zone="$VM_ZONE" --project="$GCP_PROJECT" \
            --tunnel-through-iap --ssh-key-file="$HOME/.ssh/mnw-key" \
            --ssh-flag="-oStrictHostKeyChecking=no" --ssh-flag="-oUserKnownHostsFile=/dev/null" \
            --ssh-flag="-oBatchMode=yes" --ssh-flag="-oPasswordAuthentication=no" "$@"; }
          INPUT_REF="${{ github.event.inputs.ref }}"
          REF="${INPUT_REF#origin/}"
          LANE_SLUG="mn-w-r${{ github.run_number }}"
          cat > /tmp/win-run.ps1 <<EOF
          \$env:TSDB_TAG = '${{ github.event.inputs.tsdb_tag }}'
          powershell -NoProfile -File C:\relay-harness\scripts\mn-lane-node.ps1 -ProductRef '$REF' -Plans '${{ github.event.inputs.plans }}' -LaneSlug '$LANE_SLUG'
          exit \$LASTEXITCODE
          EOF
          sed -i 's/^          //' /tmp/win-run.ps1
          B64=$(base64 -w0 /tmp/win-run.ps1)
          WSSH --command="powershell -NoProfile -Command \"[IO.File]::WriteAllText('C:\win-run.ps1',[Text.Encoding]::UTF8.GetString([Convert]::FromBase64String('$B64')))\""
          WSSH --command="powershell -NoProfile -File C:\win-run.ps1"

      - name: Fetch Windows results
        if: always() && github.event.inputs.slots == 'windows,windows'
        run: |
          rm -f summary.json metadata.json
          gcloud compute scp --quiet "relay@$VM_NAME":test-summary.json ./summary.json \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --ssh-key-file="$HOME/.ssh/mnw-key" 2>/dev/null || true
          gcloud compute scp --quiet "relay@$VM_NAME":test-metadata.json ./metadata.json \
            --zone="$VM_ZONE" --project="$GCP_PROJECT" --tunnel-through-iap \
            --ssh-key-file="$HOME/.ssh/mnw-key" 2>/dev/null || true
          if [ ! -f summary.json ]; then
            echo '{"summary":{"total":0,"pass":0,"fail":0},"tests":[],"state":"error"}' > summary.json
          fi
          if [ ! -f metadata.json ]; then
            echo '{"reportUrl":"","commit":"","execId":""}' > metadata.json
          fi

      - name: Delete Windows VM
        if: always() && github.event.inputs.slots == 'windows,windows'
        run: |
          if [ -n "${VM_NAME:-}" ]; then
            gcloud compute instances delete "$VM_NAME" \
              --zone="$VM_ZONE" --project="$GCP_PROJECT" --quiet || true
          fi

      - name: Upload shard metadata
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: testplans-mn-metadata
          path: |
            summary.json
            metadata.json
            suite-output.txt
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const shardName = process.env.SHARD_NAME || 'shard';
            const shouldRun = process.env.RUN_SHARD === 'true';

            if (!shouldRun) {
              core.summary.addRaw(`## E2E scripted test plans (${shardName})\n\n:warning: **SKIPPED** | no matching tests for this shard\n`);
              await core.summary.write();
              return;
            }

            let summary, metadata;
            try {
              summary = JSON.parse(fs.readFileSync('summary.json', 'utf-8'));
            } catch {
              core.summary.addRaw(`## E2E scripted test plans (${shardName})\n\n:x: **Failed to retrieve test results from VM**\n`);
              await core.summary.write();
              core.setFailed('No test results available');
              return;
            }
            try {
              metadata = JSON.parse(fs.readFileSync('metadata.json', 'utf-8'));
            } catch {
              metadata = { reportUrl: '', commit: '', execId: '' };
            }

            const s = summary.summary || {};
            const tests = summary.tests || [];
            const statusEmoji = {
              pass: ':white_check_mark:',
              fail: ':x:',
              expected_fail: ':warning:',
              unexpected_pass: ':sparkles:',
            };

            const totalDur = Math.round((s.duration || 0) / 1000);
            const verdictEmoji = (s.fail || 0) > 0 ? ':x:' : ':white_check_mark:';
            const verdictText = (s.fail || 0) > 0 ? 'FAIL' : 'PASS';
            const parts = [];
            if (s.pass) parts.push(`${s.pass} pass`);
            if (s.fail) parts.push(`${s.fail} fail`);
            if (s.expectedFail) parts.push(`${s.expectedFail} expected-fail`);
            if (s.unexpectedPass) parts.push(`${s.unexpectedPass} unexpected-pass`);

            let md = `## E2E scripted test plans (${shardName})\n\n`;
            md += `${verdictEmoji} **${verdictText}** | ${parts.join(', ')} | ${totalDur}s`;
            if (metadata.reportUrl) {
              md += ` | [Private Report](${metadata.reportUrl})`;
            }
            md += `\n\n`;

            const planIdFor = test => {
              const source = `${test?.dir || ''} ${test?.name || ''}`.toLowerCase();
              const match = source.match(/\btp[-_ ]?(\d{3})\b/);
              return match ? `tp${match[1]}` : 'tp???';
            };

            md += `| Test | Status |\n`;
            md += `|------|--------|\n`;
            for (const t of tests) {
              const emoji = statusEmoji[t.status] || ':grey_question:';
              md += `| ${planIdFor(t)} | ${emoji} ${t.status} |\n`;
            }

            core.summary.addRaw(md);
            await core.summary.write();

            if (metadata.reportUrl) {
              try {
                const { owner, repo } = context.repo;
                const checkName = `scripted-test (${shardName})`;
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: context.sha,
                  check_name: checkName,
                  per_page: 100,
                });
                const runPath = `/actions/runs/${context.runId}/`;
                const check = data.check_runs.find(checkRun => (checkRun.details_url || '').includes(runPath))
                  || data.check_runs[0];
                if (check) {
                  await github.rest.checks.update({
                    owner,
                    repo,
                    check_run_id: check.id,
                    details_url: metadata.reportUrl,
                  });
                }
              } catch (error) {
                core.warning(`Failed to update check details URL: ${error.message}`);
              }
            }

            if ((s.total || 0) === 0 || summary.state === 'error') {
              core.setFailed('No tests were executed');
            } else if ((s.fail || 0) > 0) {
              core.setFailed(`${s.fail} test(s) failed`);
            }
      - name: Delete VM (releases the pool lease)
        if: always() && github.event.inputs.slots == 'linux,linux'
        run: |
          # The delete is synchronous so the pool is genuinely free once the
          # run ends; --async could let the next dispatch see a half-deleted
          # instance name. Deleting the VM also destroys the credentials
          # provisioned onto it.
          if [ -n "${VM_NAME:-}" ]; then
            gcloud compute instances delete "$VM_NAME" \
              --zone="$VM_ZONE" --project="$GCP_PROJECT" --quiet || true
          fi

