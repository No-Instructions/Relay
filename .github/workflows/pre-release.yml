name: Beta Releases
on: 
  push:
    tags:
    - '*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
    - uses: actions/checkout@v4
    - name: Check if tag does not match manifest version
      id: check
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        MANIFEST_VERSION=$(jq -r .version manifest.json)
        if [ "$TAG" == "$MANIFEST_VERSION" ]; then
          echo "should_release=false" >> $GITHUB_OUTPUT
        else
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20.x'
    - run: npm ci
    - run: npm run beta
    - name: Set release artifact manifest version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        tmp="$(mktemp)"
        jq --arg version "$TAG" '.version = $version' manifest.json > "$tmp"
        mv "$tmp" manifest.json
        jq -e --arg version "$TAG" '.version == $version' manifest.json
    - name: Generate artifact attestations
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4
      with:
        subject-path: |
          main.js
          styles.css
          manifest.json
    - uses: ncipollo/release-action@v1
      with:
        artifacts: "main.js,styles.css,manifest.json"
        immutableCreate: true
        prerelease: true
