name: E2E device slot emulator proxy

# Acceptance proxy for the device-slot bridge (obsidian_device_slot.py). No
# physical device is available on hosted runners, but an emulator is adb-visible
# exactly like a USB-attached device, so `adb forward
# localabstract:webview_devtools_remote_<pid>` bridges its WebView identically.
# A green run proves provision hygiene, the adb-forward CDP bridge, the
# responsiveness probe, and teardown. Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Product ref to test (origin/main, a branch, or a SHA)'
        required: true
        default: 'origin/main'
      harness_ref:
        description: 'relay-harness ref providing the device-slot module + proxy script'
        required: false
        default: 'origin/main'
      obsidian_version:
        description: 'Obsidian Android version to install'
        required: false
        default: '1.12.7'
      api_level:
        description: 'Android API level for the emulator'
        required: false
        default: '30'
      user:
        description: 'Slot user (maps to vault + local CDP port)'
        required: false
        default: 'erik'

concurrency:
  group: e2e-device-emulator-proxy
  cancel-in-progress: false

jobs:
  device-proxy:
    name: device-slot emulator proxy
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      ANDROID_SERIAL: emulator-5554

    steps:
      - name: Checkout product
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve product ref
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || 'origin/main' }}"
          git checkout --detach "origin/${REF#origin/}" 2>/dev/null || git checkout --detach "$REF"
          echo "Product commit: $(git rev-parse HEAD)"

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build staging plugin
        shell: bash
        run: |
          npm ci --no-audit --no-fund
          node esbuild.config.mjs staging
          test -f main.js && test -f manifest.json && test -f styles.css

      - name: Clone relay-harness
        shell: bash
        env:
          HARNESS_DEPLOY_KEY: ${{ secrets.HARNESS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$HARNESS_DEPLOY_KEY" > ~/.ssh/harness-key
          chmod 600 ~/.ssh/harness-key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/harness-key -o IdentitiesOnly=yes" \
            git clone --depth 50 git@github.com:No-Instructions/relay-harness.git "$HOME/relay-harness"
          HREF="${{ github.event.inputs.harness_ref || 'origin/main' }}"
          git -C "$HOME/relay-harness" checkout --detach "origin/${HREF#origin/}" 2>/dev/null \
            || git -C "$HOME/relay-harness" checkout --detach "$HREF"
          echo "Harness commit: $(git -C "$HOME/relay-harness" rev-parse HEAD)"

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install device-slot deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # obsidian_device_slot.py imports obsidian_slot (tree-sitter at import),
          # drives the CLI with click, and probes CDP with websockets.
          python -m pip install click websockets tree-sitter tree-sitter-javascript
          python -c "import click, websockets, tree_sitter, tree_sitter_javascript"

      - name: Download Obsidian APK
        shell: bash
        run: |
          VER="${{ github.event.inputs.obsidian_version || '1.12.7' }}"
          URL="https://github.com/obsidianmd/obsidian-releases/releases/download/v${VER}/Obsidian-${VER}.apk"
          curl -fL -o "$GITHUB_WORKSPACE/obsidian.apk" "$URL"
          SIZE=$(stat -c%s "$GITHUB_WORKSPACE/obsidian.apk")
          if [ "$SIZE" -lt 8000000 ]; then
            echo "::error::Obsidian APK download looks wrong ($SIZE bytes)"; exit 1
          fi
          echo "APK $SIZE bytes"

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run device-slot emulator proxy
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.api_level || '30' }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          # dash parses `script`; run the sequence under bash.
          script: bash "$HOME/relay-harness/scripts/ci/device-emulator-proxy.sh" "${{ github.event.inputs.user || 'erik' }}" > "$HOME/emu-run.log" 2>&1
